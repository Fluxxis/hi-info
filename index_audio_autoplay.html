<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HIGHIX - Portfolio</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            background: #000;
            color: #fff;
        }

        /* Анимированный фон */
        .animated-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(45deg, #000 25%, #1a1a1a 25%, #1a1a1a 50%, #000 50%, #000 75%, #1a1a1a 75%, #1a1a1a);
            background-size: 60px 60px;
            animation: slide 20s linear infinite;
            z-index: -1;
        }

        @keyframes slide {
            0% {
                background-position: 0 0;
            }
            100% {
                background-position: 60px 60px;
            }
        }

        /* Дополнительный слой для глубины */
        .background-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 20% 50%, rgba(255, 255, 255, 0.05) 0%, transparent 50%),
                        radial-gradient(circle at 80% 80%, rgba(255, 255, 255, 0.05) 0%, transparent 50%);
            pointer-events: none;
            z-index: -1;
            animation: float 15s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% {
                transform: translate(0, 0);
            }
            50% {
                transform: translate(20px, -20px);
            }
        }

        /* Контейнер страницы */
        .container {
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow-y: auto;
        }

        /* Основной контент */
        .content {
            text-align: center;
            z-index: 1;
            animation: fadeIn 1s ease-in;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Аватар в кружке */
        .avatar-wrapper {
            position: relative;
            width: 180px;
            height: 180px;
            margin: 0 auto 40px;
            animation: bounce 3s ease-in-out infinite;
        }

        @keyframes bounce {
            0%, 100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-20px);
            }
        }

        .avatar-circle {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: linear-gradient(135deg, #fff 0%, #ccc 100%);
            padding: 4px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 0 40px rgba(255, 255, 255, 0.3),
                        inset 0 0 40px rgba(0, 0, 0, 0.3);
            animation: rotate 10s linear infinite;
        }

        @keyframes rotate {
            0% {
                transform: rotate(0deg);
            }
            100% {
                transform: rotate(360deg);
            }
        }

        .avatar-circle img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            animation: counter-rotate 10s linear infinite;
        }

        @keyframes counter-rotate {
            0% {
                transform: rotate(0deg);
            }
            100% {
                transform: rotate(-360deg);
            }
        }

        /* Гало эффект вокруг аватара */
        .avatar-wrapper::before {
            content: '';
            position: absolute;
            top: -10px;
            left: -10px;
            right: -10px;
            bottom: -10px;
            border: 2px solid transparent;
            border-radius: 50%;
            border-top-color: rgba(255, 255, 255, 0.3);
            border-right-color: rgba(255, 255, 255, 0.1);
            animation: spin 4s linear infinite;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }
            100% {
                transform: rotate(360deg);
            }
        }

        /* Текст */
        h1 {
            font-size: clamp(2rem, 5vw, 3.5rem);
            margin-bottom: 15px;
            font-weight: 800;
            letter-spacing: 2px;
            background: linear-gradient(135deg, #fff 0%, #aaa 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: slideInDown 1s ease-out 0.2s both;
        }

        .subtitle {
            font-size: clamp(1rem, 3vw, 1.3rem);
            color: #aaa;
            margin-bottom: 50px;
            font-weight: 300;
            letter-spacing: 1px;
            animation: slideInUp 1s ease-out 0.4s both;
        }

        @keyframes slideInDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes slideInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Сетка с социальными кнопками */
        .social-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(80px, 1fr));
            gap: 30px;
            max-width: 500px;
            margin: 40px auto 0;
            animation: slideInUp 1s ease-out 0.6s both;
        }

        .social-button {
            position: relative;
            width: 100%;
            aspect-ratio: 1;
            cursor: pointer;
            transition: all 0.3s ease;
            animation: float 6s ease-in-out infinite;
        }

        .social-button:nth-child(1) { animation-delay: 0s; }
        .social-button:nth-child(2) { animation-delay: 0.5s; }
        .social-button:nth-child(3) { animation-delay: 1s; }
        .social-button:nth-child(4) { animation-delay: 1.5s; }
        .social-button:nth-child(5) { animation-delay: 2s; }

        @keyframes float {
            0%, 100% {
                transform: translateY(0px);
            }
            50% {
                transform: translateY(-15px);
            }
        }

        .social-circle {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.1) 0%, rgba(255, 255, 255, 0.05) 100%);
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255, 255, 255, 0.2);
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.3s ease;
            box-shadow: 0 8px 32px 0 rgba(255, 255, 255, 0.1);
            position: relative;
            overflow: hidden;
        }

        .social-circle::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            transition: left 0.5s;
        }

        .social-button:hover .social-circle::before {
            left: 100%;
        }

        .social-button:hover .social-circle {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.2) 0%, rgba(255, 255, 255, 0.1) 100%);
            border-color: rgba(255, 255, 255, 0.4);
            box-shadow: 0 8px 32px 0 rgba(255, 255, 255, 0.2);
            transform: scale(1.1);
        }

        svg {
            width: 60%;
            height: 60%;
            filter: drop-shadow(0 0 8px rgba(255, 255, 255, 0.2));
            transition: all 0.3s ease;
        }

        .social-button:hover svg {
            filter: drop-shadow(0 0 15px rgba(255, 255, 255, 0.4));
            transform: scale(1.1);
        }

        /* Мобильная адаптация */
        @media (max-width: 768px) {
            .container {
                height: auto;
                min-height: 100vh;
                padding: 60px 20px;
            }

            .avatar-wrapper {
                width: 140px;
                height: 140px;
                margin: 0 auto 30px;
            }

            h1 {
                font-size: 2rem;
                margin-bottom: 10px;
            }

            .subtitle {
                font-size: 1rem;
                margin-bottom: 40px;
            }

            .social-grid {
                gap: 20px;
                max-width: 100%;
                grid-template-columns: repeat(auto-fit, minmax(70px, 1fr));
                margin: 30px auto 0;
            }
        }

        @media (max-width: 480px) {
            .container {
                padding: 40px 15px;
            }

            .avatar-wrapper {
                width: 120px;
                height: 120px;
                margin: 0 auto 25px;
            }

            h1 {
                font-size: 1.5rem;
            }

            .subtitle {
                font-size: 0.9rem;
                margin-bottom: 30px;
            }

            .social-grid {
                gap: 15px;
                grid-template-columns: repeat(auto-fit, minmax(60px, 1fr));
            }
        }

        /* Скрытое аудио */
        audio {
            display: none;
        }
    </style>
</head>

    <!-- Скрытая музыка -->
    <audio id="bgMusic" autoplay loop preload="auto" playsinline>
        <source src="song.mp3" type="audio/mpeg">
    </audio>

    <script>
        const audio = document.getElementById('bgMusic');

        // Скрытый автозапуск song.mp3 из той же папки, где лежит HTML
        audio.volume = 0.3;
        audio.play().catch(() => {});

        const startMusic = () => {
            audio.play().catch(() => {});
        };

        document.addEventListener('click', startMusic, { once: true });
        document.addEventListener('touchstart', startMusic, { once: true });
        document.addEventListener('keydown', startMusic, { once: true });

        // Паралакс эффект при движении мыши
        document.addEventListener('mousemove', (e) => {
            const x = e.clientX / window.innerWidth;
            const y = e.clientY / window.innerHeight;
            const overlay = document.querySelector('.background-overlay');
            overlay.style.background = `radial-gradient(circle at ${20 + x * 10}% ${50 + y * 10}%, rgba(255, 255, 255, 0.05) 0%, transparent 50%),
                                        radial-gradient(circle at ${80 - x * 10}% ${80 - y * 10}%, rgba(255, 255, 255, 0.05) 0%, transparent 50%)`;
        });
    </script>
